<div id="objectMapPanel" class="object-map object-map--v2" aria-live="polite">
  <div class="object-map__header">
    <span class="object-map__title"><span class="object-map__title-icon ui-icon ui-icon--map" aria-hidden="true"></span>Object Maps</span>
  </div>
  <div class="object-map-v2__toolbar">
    <div class="object-map-v2__app-title">
      <img class="object-map-v2__app-title-icon" src="/icons/object-map.svg" alt="" aria-hidden="true">
      <span>Object Maps</span>
    </div>
    <div class="object-map-v2__scope" aria-label="Object Map world selector">
      <button id="objectMapToggleChernarus" class="types-explorer__scope-btn ui-action-btn is-active" type="button" data-object-map="chernarus">Chernarus</button>
      <button id="objectMapToggleLivonia" class="types-explorer__scope-btn ui-action-btn" type="button" data-object-map="livonia">Livonia</button>
      <button id="objectMapToggleSakhal" class="types-explorer__scope-btn ui-action-btn" type="button" data-object-map="sakhal">Sakhal</button>
    </div>
  </div>
  <div class="object-map-v2__frame">
    <iframe id="objectMapV2Frame" class="object-map-v2__iframe" src="about:blank" data-map-path="/object-map-v2/?embedded=1" title="Object Map V2" loading="lazy"></iframe>
  </div>
  <div class="object-map__note">Object Map V2 replaces the legacy inline Chernarus map here.</div>
</div>

<div id="chernarusMapLightbox" class="map-lightbox" role="dialog" aria-modal="true" aria-label="Map viewer" aria-hidden="true">
  <div class="map-lightbox__content">
    <button id="chernarusMapOpenObjectMap" class="map-lightbox__reset map-lightbox__open-object-map" type="button">Open in Object Map</button>
    <button id="chernarusMapReset" class="map-lightbox__reset" type="button">Reset view</button>
    <button id="chernarusMapClose" class="map-lightbox__close" type="button" aria-label="Close map"><span aria-hidden="true">✕</span></button>
    <div class="map-lightbox__frame">
      <svg id="chernarusMapOverlay" class="map-lightbox__overlay" preserveAspectRatio="none" aria-hidden="true">
        <g transform="scale(1,-1)">
          <g id="chernarusMapBackdropGroup"></g>
          <g id="chernarusMapSelectionGroup"></g>
        </g>
      </svg>
      <div class="map-lightbox__meta">
        <div id="chernarusMapLabel" class="map-lightbox__label">Map</div>
        <div id="chernarusMapMeta" class="map-lightbox__subtle"></div>
        <div id="chernarusMapStatus" class="map-lightbox__status"></div>
      </div>
      <div id="chernarusMapToast" class="map-lightbox__toast" aria-live="polite"></div>
    </div>
  </div>
</div>
